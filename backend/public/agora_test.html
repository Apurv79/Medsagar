<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medsagar Agora Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: #f4f6f8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .vid-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .video-box {
            flex: 1;
            height: 300px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 4px;
            z-index: 10;
            font-size: 12px;
        }
    </style>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
</head>

<body>
    <div class="container">
        <h1>Medsagar Teleconsultation (Agora)</h1>

        <div class="form-group">
            <label for="appId">Agora App ID (Get this from your backend .env or Agora Dashboard)</label>
            <input type="text" id="appId" placeholder="Enter your Agora App ID">
        </div>

        <div class="form-group">
            <label for="channel">Channel Name (from /join API)</label>
            <input type="text" id="channel" placeholder="E.g., consultation_641...">
        </div>

        <div class="form-group">
            <label for="token">Agora RTC Token (from /join API)</label>
            <input type="text" id="token" placeholder="Enter Token">
        </div>

        <div>
            <button id="join-btn" onclick="joinCall()">Join Call</button>
            <button id="leave-btn" onclick="leaveCall()" disabled>Leave Call</button>
        </div>

        <div class="vid-container">
            <div id="local-player" class="video-box">
                <div class="video-label">Local User</div>
            </div>
            <div id="remote-player" class="video-box">
                <div class="video-label">Remote User</div>
            </div>
        </div>
    </div>

    <script>
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = {
            videoTrack: null,
            audioTrack: null
        };
        let remoteUsers = {};

        async function joinCall() {
            const appId = document.getElementById("appId").value;
            const channel = document.getElementById("channel").value;
            const token = document.getElementById("token").value;

            if (!appId || !channel || !token) {
                alert("Please ensure AppId, Channel, and Token are populated.");
                return;
            }

            document.getElementById("join-btn").disabled = true;
            document.getElementById("leave-btn").disabled = false;

            client.on("user-published", handleUserPublished);
            client.on("user-unpublished", handleUserUnpublished);

            try {
                // Joining with UID 0 to match backend token generation
                const uid = await client.join(appId, channel, token, 0);

                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();

                localTracks.videoTrack.play("local-player");

                await client.publish(Object.values(localTracks));
                console.log("Successfully published local tracks. UID:", uid);
            } catch (error) {
                console.error("Join call failed", error);
                alert("Failed to join call. Check console for details.");
            }
        }

        async function leaveCall() {
            for (trackName in localTracks) {
                var track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }

            await client.leave();
            document.getElementById("remote-player").innerHTML = '<div class="video-label">Remote User</div>';

            document.getElementById("join-btn").disabled = false;
            document.getElementById("leave-btn").disabled = true;
            console.log("Client left channel");
        }

        async function handleUserPublished(user, mediaType) {
            await client.subscribe(user, mediaType);
            console.log("Subscribed to remote user");

            if (mediaType === "video") {
                const playerContainer = document.getElementById("remote-player");
                user.videoTrack.play(playerContainer);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        }

        async function handleUserUnpublished(user, mediaType) {
            console.log("Remote user unpublished");
            if (mediaType === "video") {
                document.getElementById("remote-player").innerHTML = '<div class="video-label">Remote User</div>';
            }
        }
    </script>
</body>

</html>
