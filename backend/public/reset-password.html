<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Medsagar Test</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        .message {
            margin-top: 1rem;
            text-align: center;
            padding: 0.5rem;
            border-radius: 0.25rem;
            display: none;
        }

        .success {
            background: #065f46;
            color: #a7f3d0;
        }

        .error {
            background: #991b1b;
            color: #fecaca;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Reset Password</h1>
        <div id="form-container">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="At least 6 characters">

            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Match new password">

            <button id="reset-btn">Update Password</button>
        </div>
        <div id="msg" class="message"></div>
    </div>

    <!-- Move script to external file and remove inline onclick to satisfy CSP -->
    <script src="/public/js/reset.js"></script>
</body>

</html>
